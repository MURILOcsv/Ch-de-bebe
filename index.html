<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chá de Bebê da Antonella 🎀</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: linear-gradient(160deg, #fff0f5 0%, #fce4ec 30%, #f3e5f5 60%, #e8eaf6 100%);
    font-family: 'Quicksand', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    position: relative;
    overflow-x: hidden;
  }

  /* Floating decorations */
  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    opacity: 0.08;
    z-index: 0;
  }
  body::before {
    width: 400px; height: 400px;
    background: #ec4899;
    top: -100px; right: -100px;
    animation: float1 8s ease-in-out infinite;
  }
  body::after {
    width: 300px; height: 300px;
    background: #a855f7;
    bottom: -80px; left: -80px;
    animation: float2 10s ease-in-out infinite;
  }

  @keyframes float1 {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(-30px, 30px); }
  }
  @keyframes float2 {
    0%, 100% { transform: translate(0, 0); }
    50% { transform: translate(20px, -20px); }
  }

  .card {
    background: rgba(255, 255, 255, 0.92);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(236, 72, 153, 0.1);
    border-radius: 32px;
    padding: 48px 36px;
    max-width: 420px;
    width: 100%;
    text-align: center;
    position: relative;
    z-index: 1;
    box-shadow:
      0 4px 24px rgba(236, 72, 153, 0.08),
      0 24px 48px rgba(0, 0, 0, 0.04);
    animation: cardIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(40px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .ribbon {
    font-size: 56px;
    margin-bottom: 8px;
    animation: ribbonBounce 2s ease-in-out infinite;
  }

  @keyframes ribbonBounce {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.1) rotate(3deg); }
  }

  .pretitle {
    font-family: 'Quicksand', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #c084fc;
    margin-bottom: 4px;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    color: #be185d;
    font-size: 36px;
    font-weight: 700;
    margin-bottom: 4px;
    line-height: 1.2;
  }

  .baby-name {
    font-family: 'Playfair Display', serif;
    font-size: 42px;
    font-weight: 700;
    background: linear-gradient(135deg, #ec4899, #a855f7);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }

  .subtitle {
    color: #9ca3af;
    font-size: 15px;
    font-weight: 500;
    margin-bottom: 32px;
  }

  .divider {
    width: 60px;
    height: 2px;
    background: linear-gradient(90deg, transparent, #ec4899, transparent);
    margin: 0 auto 32px;
    border: none;
  }

  .form-group {
    text-align: left;
    margin-bottom: 20px;
  }

  label {
    display: block;
    color: #6b7280;
    font-weight: 600;
    font-size: 13px;
    margin-bottom: 8px;
    letter-spacing: 0.5px;
  }

  input[type="text"] {
    width: 100%;
    padding: 14px 18px;
    border: 2px solid #f3e8ff;
    border-radius: 14px;
    font-size: 16px;
    font-family: 'Quicksand', sans-serif;
    font-weight: 500;
    outline: none;
    transition: all 0.3s ease;
    background: rgba(255, 255, 255, 0.8);
    color: #374151;
  }

  input[type="text"]:focus {
    border-color: #ec4899;
    box-shadow: 0 0 0 4px rgba(236, 72, 153, 0.1);
  }

  input[type="text"]::placeholder {
    color: #d1d5db;
  }

  .btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, #ec4899, #d946ef);
    color: white;
    border: none;
    border-radius: 14px;
    font-size: 16px;
    font-family: 'Quicksand', sans-serif;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s ease;
    letter-spacing: 0.5px;
    position: relative;
    overflow: hidden;
  }

  .btn::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    transition: left 0.5s;
  }

  .btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(236, 72, 153, 0.35);
  }

  .btn:hover::before {
    left: 100%;
  }

  .btn:active {
    transform: translateY(0);
  }

  .btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none !important;
    box-shadow: none !important;
  }

  .footer {
    color: #c4b5d5;
    font-size: 12px;
    margin-top: 28px;
    font-weight: 500;
  }

  /* Success state */
  .success-card {
    display: none;
    animation: successIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  @keyframes successIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }

  .check-circle {
    width: 88px;
    height: 88px;
    background: linear-gradient(135deg, #ec4899, #d946ef);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
    animation: popIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) 0.2s both;
  }

  @keyframes popIn {
    from { transform: scale(0); }
    to { transform: scale(1); }
  }

  .check-circle svg {
    width: 40px;
    height: 40px;
    stroke: white;
    stroke-width: 3;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .success-title {
    font-family: 'Playfair Display', serif;
    color: #be185d;
    font-size: 28px;
    margin-bottom: 12px;
  }

  .success-name {
    color: #d946ef;
    font-weight: 700;
    font-size: 18px;
  }

  .success-msg {
    color: #6b7280;
    font-size: 15px;
    margin: 8px 0;
    line-height: 1.6;
  }

  /* Error */
  .error-msg {
    background: #fef2f2;
    border: 1px solid #fecaca;
    color: #dc2626;
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 13px;
    margin-bottom: 16px;
    display: none;
    font-weight: 600;
  }

  /* Confetti */
  .confetti-container {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 100;
    overflow: hidden;
  }

  .confetti {
    position: absolute;
    top: -10px;
    opacity: 0;
    animation: confettiFall 3s ease-in forwards;
  }

  @keyframes confettiFall {
    0% { opacity: 1; transform: translateY(0) rotate(0deg); }
    100% { opacity: 0; transform: translateY(100vh) rotate(720deg); }
  }

  @media (max-width: 480px) {
    .card { padding: 36px 24px; }
    h1 { font-size: 28px; }
    .baby-name { font-size: 34px; }
  }
</style>
</head>
<body>

<div class="card">
  <!-- FORMULÁRIO -->
  <div id="formView">
    <div class="ribbon">🎀</div>
    <p class="pretitle">Você está convidado(a)</p>
    <h1>Chá de Bebê</h1>
    <div class="baby-name">Antonella</div>
    <p class="subtitle">Confirme sua presença 💕</p>
    <hr class="divider">

    <div id="errorMsg" class="error-msg"></div>

    <div id="form">
      <div class="form-group">
        <label for="nome">Seu nome completo</label>
        <input type="text" id="nome" placeholder="Ex: Maria Silva" autofocus>
      </div>
      <button type="button" class="btn" id="btn" onclick="confirmar()">
        Confirmar Presença ✨
      </button>
    </div>

    <p class="footer">Sua presença é o melhor presente! 💝</p>
  </div>

  <!-- SUCESSO -->
  <div id="successView" class="success-card">
    <div class="check-circle">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
    </div>
    <h2 class="success-title">Presença Confirmada! 🎉</h2>
    <p class="success-msg">
      Obrigada, <span id="confirmedName" class="success-name"></span>!
    </p>
    <p class="success-msg">Mal podemos esperar para te ver! 💕</p>
    <hr class="divider">
    <p class="footer">Sua presença é um presente especial 🎀</p>
  </div>
</div>

<!-- Confetti container -->
<div id="confettiContainer" class="confetti-container"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  // =============================================
  // CONFIGURAÇÃO DO SUPABASE
  // Substitua pelos seus valores!
  // =============================================
  const SUPABASE_URL = 'https://aoepbslpicurpsuvxlqn.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_VR-jsfc04oSmzbSo727cXA_nqUH4EsA';

  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  async function confirmar() {
    const nome = document.getElementById('nome').value.trim();
    const btn = document.getElementById('btn');
    const errorMsg = document.getElementById('errorMsg');

    if (!nome) {
      errorMsg.textContent = 'Por favor, digite seu nome.';
      errorMsg.style.display = 'block';
      return;
    }

    // Desabilitar botão
    btn.disabled = true;
    btn.textContent = 'Confirmando...';
    errorMsg.style.display = 'none';

    try {
      const { data, error } = await supabase
        .from('confirmacoes_cha_bebe')
        .insert([
          { nome: nome, confirmado: true }
        ]);

      if (error) throw error;

      // Mostrar sucesso
      document.getElementById('confirmedName').textContent = nome;
      document.getElementById('formView').style.display = 'none';
      document.getElementById('successView').style.display = 'block';

      // Lançar confetti!
      launchConfetti();

    } catch (err) {
      console.error('Erro:', err);
      errorMsg.textContent = 'Erro ao confirmar. Tente novamente.';
      errorMsg.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Confirmar Presença ✨';
    }
  }

  // Confetti animation
  function launchConfetti() {
    const container = document.getElementById('confettiContainer');
    const colors = ['#ec4899', '#d946ef', '#a855f7', '#f472b6', '#c084fc', '#fbbf24', '#34d399'];
    const shapes = ['●', '■', '▲', '★', '♥', '🎀', '✨'];

    for (let i = 0; i < 50; i++) {
      setTimeout(() => {
        const confetti = document.createElement('div');
        confetti.className = 'confetti';
        confetti.textContent = shapes[Math.floor(Math.random() * shapes.length)];
        confetti.style.left = Math.random() * 100 + 'vw';
        confetti.style.fontSize = (Math.random() * 16 + 8) + 'px';
        confetti.style.color = colors[Math.floor(Math.random() * colors.length)];
        confetti.style.animationDuration = (Math.random() * 2 + 2) + 's';
        confetti.style.animationDelay = (Math.random() * 0.5) + 's';
        container.appendChild(confetti);

        setTimeout(() => confetti.remove(), 4000);
      }, i * 60);
    }
  }
</script>

</body>
</html>
